name: PR Check

on:
  pull_request:
    branches: [main, staging]

jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - run: cd webapp && npm ci
      - run: cd webapp && npx tsc --noEmit
