# BlackBar Railway Configuration
# Production: main branch → blackbar-scg-production.up.railway.app
# Staging: staging branch → configured separately in Railway dashboard
# Both services use identical build/deploy commands

[build]
buildCommand = "cd webapp && npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "cd webapp && node dist/server/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
